name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-api:
    name: Deploy Functions to Azure
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish Functions
        run: |
          dotnet publish backend/PPDO.Functions/PPDO.Functions.csproj \
            --configuration Release \
            --output ${{ github.workspace }}/publish/api

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ppdo-portal-api
          package: ${{ github.workspace }}/publish/api
          publish-profile: ${{ secrets.AZURE_FUNCTIONS_PUBLISH_PROFILE }}

  deploy-frontend:
    name: Deploy Frontend to Azure Static Web Apps
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: .next
        env:
          # Baked into the Next.js build at compile time.
          # SWA proxies /api/* to the linked Functions app — no full URL needed.
          NEXT_PUBLIC_API_BASE_URL: /api
