name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy-api:
    name: Deploy Functions to Azure
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish Functions
        run: |
          dotnet publish backend/PPDO.Functions/PPDO.Functions.csproj \
            --configuration Release \
            --output ${{ github.workspace }}/publish/api

      - name: Zip published output
        run: |
          cd ${{ github.workspace }}/publish/api
          zip -r ${{ github.workspace }}/publish/function.zip .

      - name: Deploy to Azure Functions via ZIP deploy
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONS_PUBLISH_PROFILE }}
        run: |
          # Extract MSDeploy credentials from publish profile XML
          USER=$(echo "$PUBLISH_PROFILE" | python3 -c "
          import sys, xml.etree.ElementTree as ET
          root = ET.parse(sys.stdin).getroot()
          p = root.find('.//publishProfile[@publishMethod=\"MSDeploy\"]')
          print(p.get('userName'))
          ")
          PASS=$(echo "$PUBLISH_PROFILE" | python3 -c "
          import sys, xml.etree.ElementTree as ET
          root = ET.parse(sys.stdin).getroot()
          p = root.find('.//publishProfile[@publishMethod=\"MSDeploy\"]')
          print(p.get('userPWD'))
          ")

          curl -X POST \
            "https://ppdo-portal-api.scm.azurewebsites.net/api/zipdeploy" \
            -u "${USER}:${PASS}" \
            --data-binary @${{ github.workspace }}/publish/function.zip \
            --fail \
            --silent \
            --show-error

  deploy-frontend:
    name: Deploy Frontend to Azure Static Web Apps
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend
          output_location: out
        env:
          # Baked into the Next.js build at compile time.
          # Points directly to the Azure Functions app (SWA Free tier does not support API linking).
          NEXT_PUBLIC_API_BASE_URL: https://ppdo-portal-api-dpevbthmd5dycacq.centralus-01.azurewebsites.net/api
