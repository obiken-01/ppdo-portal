name: CI

on:
  pull_request:
    branches:
      - main
      - 'release/**'   # run CI on PRs into release integration branches (e.g. release/1.1.0)

jobs:
  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore backend/PPDO.slnx

      - name: Build
        run: dotnet build backend/PPDO.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test backend/PPDO.slnx --no-build --configuration Release --verbosity normal

  frontend:
    name: Frontend — build & lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: /api

      - name: Lint
        working-directory: frontend
        run: npm run lint
